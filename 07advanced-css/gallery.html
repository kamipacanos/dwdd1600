    <main>
        <h1>Japan Gallery</h1>
        <p>Explore images that capture some of the beauty, culture, food, and landscapes that make Japan such an
            exciting travel destination.</p>

        <div class="gallery">
            <figure>
                <img src="images/tokyo.webp" alt="Tokyo city street at night with bright signs" loading="lazy" width="164" height="300">
                <figcaption>Tokyo at night</figcaption>
            </figure>

            <figure>
                <img src="images/temple.webp" alt="Traditional temple in Kyoto during the day" loading="lazy" width="200" height="300">
                <figcaption>Kyoto temple</figcaption>
            </figure>

            <figure>
                <img src="images/mount-fuji.webp" alt="Mount Fuji visible above the landscape" loading="lazy" width="164" height="300">
                <figcaption>Mount Fuji</figcaption>
            </figure>

            <figure>
                <img src="images/cherry-blossoms.webp" alt="Cherry blossoms in full bloom near a walkway" loading="lazy" width="200" height="300">
                <figcaption>Cherry blossom season</figcaption>
            </figure>

            <figure>
                <img src="images/food.webp" alt="Japanese food arranged neatly on a table" loading="lazy" width="30"
                    height="298">
                <figcaption>Japanese cuisine</figcaption>
            </figure>

            <figure>
                <img src="images/torii-gates.webp" alt="Red torii gates forming a path at a shrine" loading="lazy" width="142" height="300">
                <figcaption>Torii gate pathway</figcaption>
            </figure>

            <figure>
                <img src="images/peace-home-garden.webp"
                    alt="A peaceful traditional Japanese home surrounded by a garden with trees and stone paths"
                    loading="lazy" width="300" height="300">
                <figcaption>Peaceful Japanese home with a garden</figcaption>
            </figure>

            <figure>
                <img src="images/winter.webp" alt="Snowy village scene in Japan during winter" loading="lazy" width="250" height="300">
                <figcaption>Winter in Japan</figcaption>
            </figure>
        </div>
